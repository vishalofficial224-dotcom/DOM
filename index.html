<!DOCTYPE html> <!--document type node-->
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!--head, title, html are the element type node-->
<body>
    <!-- comment -->  <!--this is node-->
    <p id="message">text node</p>    <!--text node-->
    <button type="radio" name="nameAttribute" value="Python"></button>
    <h1 class="className">access me using my tag name</h1>
    <h2 class="className">class name</h2>

    <div class="title">
        <p class="text1">its child element 1</p>
        <p class="text2">its child element 2</p>
        <p class="text3">its child element 3</p>
        <p class="text4">its child element 4</p>
        <p class="text5">its child element 5</p>
    </div>

    <ul id="menu">
        <li>home</li>
        <li>about</li>
        <li>blog</li>
        <li>project</li>
    </ul>

    <input type="text" id="username" placeholder="username">

    <script src="dom_manipulation.js">

    </script>
</body>

</html>
