<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: grid;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url(background.jpg), no-repeat;
            background-size: cover;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 90vh;
            width: 1000px;
            border: 2px solid wheat;
            border-radius: 10px;
        }

        ul {
            list-style-type: none;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

        }

        .list-items {
            border: 2px solid black;
            padding: 20px;
            width: 900px;
            text-align: center;
            font-size: 20px;
            margin: 2px;
            background: wheat;
        }

        h1 {
            color: wheat;
            font-size: 40px;
        }


    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-heading">Fav Movie Franchise</h1>
        <ul>
            <li class="list-items">
                <span>Neo</span>
                The Matrix</li>
            <li class="list-items">Star Wars</li>
            <li class="list-items">Harry Potter</li>
            <li class="list-items">Lord of the Rings</li>
            <li class="list-items">Marvel</li>
        </ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
